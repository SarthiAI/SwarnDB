version: "3.8"

services:
  swarndb:
    build: .
    container_name: swarndb
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      SWARNDB_HOST: "0.0.0.0"
      SWARNDB_GRPC_PORT: "50051"
      SWARNDB_REST_PORT: "8080"
      SWARNDB_DATA_DIR: "/data"
      SWARNDB_LOG_LEVEL: "info"
      SWARNDB_API_KEYS: ""
    volumes:
      - swarndb_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  swarndb_data:
    driver: local
