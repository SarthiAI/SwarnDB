syntax = "proto3";
package swarndb.v1;

import "swarndb/v1/common.proto";

service VectorService {
  rpc Insert(InsertRequest) returns (InsertResponse);
  rpc Get(GetVectorRequest) returns (GetVectorResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteVectorRequest) returns (DeleteVectorResponse);
  rpc BulkInsert(stream InsertRequest) returns (BulkInsertResponse);
  rpc BulkInsertWithOptions(stream BulkInsertStreamMessage) returns (BulkInsertResponse);
  rpc Optimize(OptimizeRequest) returns (OptimizeResponse);
}

message InsertRequest {
  string collection = 1;
  Vector vector = 2;
  Metadata metadata = 3;
  uint64 id = 4;  // 0 = auto-assign
}

message InsertResponse {
  uint64 id = 1;
  bool success = 2;
}

message GetVectorRequest {
  string collection = 1;
  uint64 id = 2;
}

message GetVectorResponse {
  uint64 id = 1;
  Vector vector = 2;
  Metadata metadata = 3;
}

message UpdateRequest {
  string collection = 1;
  uint64 id = 2;
  optional Vector vector = 3;
  Metadata metadata = 4;
}

message UpdateResponse {
  bool success = 1;
}

message DeleteVectorRequest {
  string collection = 1;
  uint64 id = 2;
}

message DeleteVectorResponse {
  bool success = 1;
}

message BulkInsertResponse {
  uint64 inserted_count = 1;
  repeated string errors = 2;
}

message BulkInsertOptions {
  uint32 batch_lock_size = 1;        // Number of vectors to lock-and-insert at once (default: 1, max: 10000)
  bool defer_graph = 2;              // Skip graph computation during insert, rebuild via optimize()
  uint32 wal_flush_every = 3;        // Flush WAL every N vectors (default: 1, 0 = disable WAL)
  uint32 ef_construction = 4;        // Override HNSW ef_construction for this bulk insert (0 = use collection default)
  string index_mode = 5;             // "immediate" (default) or "deferred"
  bool skip_metadata_index = 6;      // Skip per-vector metadata indexing, rebuild via optimize()
  bool parallel_build = 7;           // Use parallel HNSW construction (only with index_mode=deferred)
}

message BulkInsertStreamMessage {
  oneof payload {
    BulkInsertOptions options = 1;    // First message: options
    InsertRequest vector = 2;         // Subsequent messages: vectors
  }
}

message OptimizeRequest {
  string collection = 1;
}

message OptimizeResponse {
  string status = 1;                 // "completed", "already_optimized", "error"
  string message = 2;
  uint64 duration_ms = 3;
  uint64 vectors_processed = 4;
}
