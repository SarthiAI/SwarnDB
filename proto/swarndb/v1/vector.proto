syntax = "proto3";
package swarndb.v1;

import "swarndb/v1/common.proto";

service VectorService {
  rpc Insert(InsertRequest) returns (InsertResponse);
  rpc Get(GetVectorRequest) returns (GetVectorResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteVectorRequest) returns (DeleteVectorResponse);
  rpc BulkInsert(stream InsertRequest) returns (BulkInsertResponse);
  rpc BulkInsertWithOptions(stream BulkInsertStreamMessage) returns (BulkInsertResponse);
  rpc BulkInsertFromPath(BulkInsertFromPathRequest) returns (BulkInsertResponse);
  rpc Optimize(OptimizeRequest) returns (OptimizeResponse);
  rpc PruneWAL(PruneWALRequest) returns (PruneWALResponse);
  rpc Compact(CompactRequest) returns (CompactResponse);
}

message InsertRequest {
  string collection = 1;
  Vector vector = 2;
  Metadata metadata = 3;
  uint64 id = 4;  // 0 = auto-assign
}

message InsertResponse {
  uint64 id = 1;
  bool success = 2;
}

message GetVectorRequest {
  string collection = 1;
  uint64 id = 2;
}

message GetVectorResponse {
  uint64 id = 1;
  Vector vector = 2;
  Metadata metadata = 3;
}

message UpdateRequest {
  string collection = 1;
  uint64 id = 2;
  optional Vector vector = 3;
  Metadata metadata = 4;
}

message UpdateResponse {
  bool success = 1;
}

message DeleteVectorRequest {
  string collection = 1;
  uint64 id = 2;
}

message DeleteVectorResponse {
  bool success = 1;
}

message BulkInsertResponse {
  uint64 inserted_count = 1;
  repeated string errors = 2;
  uint64 last_completed_batch_idx = 3;
  uint64 last_committed_lsn = 4;
  string resume_token = 5;
  // Server-assigned vector ids in input order, parallel to the Ok arms of the chunk loop.
  repeated uint64 assigned_ids = 6;
}

message BulkInsertOptions {
  uint32 batch_lock_size = 1;        // Number of vectors to lock-and-insert at once (default: 1, max: 10000)
  bool defer_graph = 2;              // Skip graph computation during insert, rebuild via optimize()
  uint32 wal_flush_every = 3;        // Flush WAL every N vectors (default: 1, 0 = disable WAL)
  uint32 ef_construction = 4;        // Override HNSW ef_construction for this bulk insert (0 = use collection default)
  string index_mode = 5;             // "immediate" (default) or "deferred"
  bool skip_metadata_index = 6;      // Skip per-vector metadata indexing, rebuild via optimize()
  bool parallel_build = 7;           // Use parallel HNSW construction (only with index_mode=deferred)
  uint32 checkpoint_every = 8;       // Write checkpoint every N batches (0 = never)
  string resume_token = 9;           // Opaque token from a prior partial bulk insert response
}

message BulkInsertStreamMessage {
  oneof payload {
    BulkInsertOptions options = 1;    // First message: options
    InsertRequest vector = 2;         // Subsequent messages: vectors
  }
}

message OptimizeRequest {
  string collection = 1;
  bool rebuild_graph = 2;  // If true, rebuild virtual graph. Default false = skip graph rebuild.
}

message OptimizeResponse {
  string status = 1;                 // "completed", "already_optimized", "error"
  string message = 2;
  uint64 duration_ms = 3;
  uint64 vectors_processed = 4;
}

message PruneWALRequest {
  string collection = 1;
}

message PruneWALResponse {
  string status = 1;
  uint64 files_deleted = 2;
  uint64 bytes_freed = 3;
  uint64 duration_ms = 4;
}

message CompactRequest {
  string collection = 1;
  uint32 min_segments = 2;  // Minimum segments to trigger compaction. 0 = use default (4).
  bool remove_deleted = 3;  // Remove deleted vectors during compaction. Default true.
}

message CompactResponse {
  string status = 1;
  uint64 segments_merged = 2;
  uint64 vectors_written = 3;
  uint64 vectors_removed = 4;
  uint64 duration_ms = 5;
}

message BulkInsertFromPathRequest {
  string collection = 1;
  string path = 2;
  uint32 dim = 3;
  uint64 expected_count = 4;
  uint64 total_count_hint = 5;
  uint64 id_start = 6;
  string ids_path = 7;
  bool skip_metadata_index = 8;
  string index_mode = 9;
  uint32 ef_construction = 10;
  uint32 chunk_size = 11;
}
