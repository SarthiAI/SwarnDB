apiVersion: v1
kind: Service
metadata:
  name: swarndb
  namespace: swarndb
  labels:
    app.kubernetes.io/name: swarndb
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: swarndb
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
    - name: rest
      port: 8080
      targetPort: rest
      protocol: TCP
