apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: swarndb
  namespace: swarndb
  labels:
    app.kubernetes.io/name: swarndb
    app.kubernetes.io/part-of: swarndb
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - swarndb.example.com
      secretName: swarndb-tls
  rules:
    - host: swarndb.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: swarndb
                port:
                  number: 8080
