apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: swarndb-default-deny
  namespace: swarndb
  labels:
    app.kubernetes.io/name: swarndb
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: swarndb
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: swarndb-client
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 8080
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to: []
