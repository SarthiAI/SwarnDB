# NOTE: The default PVC uses ReadWriteOnce (RWO) access mode, which binds to a single node.
# Scaling beyond 1 replica requires either:
#   1. Changing the PVC to ReadWriteMany (RWX) with a compatible storage class, or
#   2. Using a StatefulSet with per-replica PVCs.
# With RWO, pods scheduled on different nodes will fail to mount the volume.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: swarndb
  namespace: swarndb
  labels:
    app.kubernetes.io/name: swarndb
    app.kubernetes.io/component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: swarndb
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
