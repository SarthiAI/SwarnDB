{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "swarndb.fullname" . }}
  labels:
    {{- include "swarndb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "swarndb.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: swarndb-client
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.service.grpcPort }}
        - protocol: TCP
          port: {{ .Values.service.restPort }}
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to: []
{{- end }}
