apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "swarndb.fullname" . }}
  labels:
    {{- include "swarndb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "swarndb.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.restPort }}
        - protocol: TCP
          port: {{ .Values.service.grpcPort }}
