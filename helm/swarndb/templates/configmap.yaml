apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "swarndb.fullname" . }}
  labels:
    {{- include "swarndb.labels" . | nindent 4 }}
data:
  log-level: {{ .Values.config.logLevel | quote }}
  max-connections: {{ .Values.config.maxConnections | quote }}
  request-timeout-ms: {{ .Values.config.requestTimeoutMs | quote }}
  grpc-port: {{ .Values.service.grpcPort | quote }}
  rest-port: {{ .Values.service.restPort | quote }}
